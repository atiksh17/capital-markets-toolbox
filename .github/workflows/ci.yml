name: ci

on:
  push:
    branches: [main]
    paths:
      - 'mcp/secforms-db/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'mcp/secforms-db/**'
      - '.github/workflows/ci.yml'

jobs:
  test-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/secforms-db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run guard tests
        run: pytest tests/test_guard.py -q
      - name: Run auth tests
        env:
          PG_DSN: postgresql://nobody:nobody@127.0.0.1:1/none
          BEARER_TOKENS: good-token
        run: pytest tests/test_auth.py -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test-mcp
    steps:
      - uses: actions/checkout@v4
      - name: Build image (sanity)
        working-directory: mcp/secforms-db
        run: docker build -t secforms-mcp:ci .
