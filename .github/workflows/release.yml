name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  package-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build skill zip
        run: |
          mkdir -p dist
          cd skills
          zip -r ../dist/secforms-db-skill.zip secforms-db \
            -x 'secforms-db/scripts/*' \
            -x '*.DS_Store'
          ls -la ../dist/

      - name: Compute checksums
        run: |
          cd dist
          sha256sum secforms-db-skill.zip > secforms-db-skill.zip.sha256
          cat secforms-db-skill.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/secforms-db-skill.zip
            dist/secforms-db-skill.zip.sha256

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: package-skill
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: mcp/secforms-db
          file: mcp/secforms-db/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/secforms-mcp:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/secforms-mcp:latest
