      - .env.local
    environment:
      PG_DSN: "postgresql://secforms_ro:L3ZMpgN48vWvYO3skmW4%2FBgKvOmiy7HhANPYbyl%2BXSg%3D@sec-postgres:5432/secforms?sslmode=disable"
